name: Git sync

description: Pull latest changes from remote and rebase current branch

inputs:
  branch:
    description: Git branch to pull (defaults to current branch)
    required: false
    default: ${{ github.ref_name }}

runs:
  using: "composite"
  steps:
    - name: Pull latest changes
      shell: bash
      run: |
        set -euo pipefail
        git pull --rebase origin "${{ inputs.branch }}"
