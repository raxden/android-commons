name: 'Bump module version'
description: 'Bump module version'

inputs:
  id:
    description: 'Value used to identify the workflow run'
    required: false
    default: ${{ github.run_number }}

  module:
    description: 'Module name to bump version'
    required: true

  version:
    description: 'Bump type (patch/minor/major)'
    required: false
    default: 'patch'

  push:
    description: 'Push changes (true/false)'
    required: false
    default: 'true'

  git-user-name:
    description: 'Git user name'
    required: true

  git-user-email:
    description: 'Git user email'
    required: true

  git-branch:
    description: 'Git branch'
    required: true

  git-create-tag:
    description: 'Create tag (true/false)'
    required: false
    default: 'false'

outputs:
  version:
    description: 'Module bumped version'
    value: ${{ steps.get_version.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Git config + sync branch
      shell: bash
      run: |
        set -euo pipefail
        git config user.name "${{ inputs.git-user-name }}"
        git config user.email "${{ inputs.git-user-email }}"
        git pull --rebase origin "${{ inputs.git-branch }}"

    - name: Bump version
      shell: bash
      run: |
        set -euo pipefail
        case "${{ inputs.version }}" in
          patch) task=increasePatchVersion ;;
          minor) task=increaseMinorVersion ;;
          major) task=increaseMajorVersion ;;
          *) echo "version must be patch|minor|major"; exit 1 ;;
        esac
        ./gradlew "${{ inputs.module }}:$task" --no-configuration-cache

    - name: Get version
      id: get_version
      shell: bash
      run: |
        echo "Get current version from ${{ inputs.module }}"
        VERSION=$(./gradlew -q ${{ inputs.module }}:getVersion | tail -n 1)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Commit (+ optional tag)
      id: commit
      shell: bash
      run: |
        set -euo pipefail

        if git diff --quiet; then
          echo "committed=false" >> "$GITHUB_OUTPUT"
          echo "No changes to commit" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        git add .
        git commit -m "Bump ${{ inputs.module }} version to ${{ steps.get_version.outputs.version }} [skip ci]"
        echo "committed=true" >> "$GITHUB_OUTPUT"

        if [[ "${{ inputs.git-create-tag }}" == "true" ]]; then
          git tag "${{ steps.get_version.outputs.version }}"
        fi

        echo ":rocket: ${{ inputs.module }} bumped to ${{ steps.get_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"

    - name: Push changes
      if: inputs.push == 'true' && steps.commit.outputs.committed == 'true'
      uses: ad-m/github-push-action@master
      with:
        branch: ${{ inputs.git-branch }}
        ssh: true
        force: false
        tags: true