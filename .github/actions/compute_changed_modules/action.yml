name: Compute changed modules
description: Detects changed modules and returns matrix JSON

inputs:
  modules:
    description: "Optional JSON array override"
    required: false
    default: ""

outputs:
  value:
    description: "JSON array of module paths"
    value: ${{ steps.matrix.outputs.value }}

  hasModules:
    description: "Whether modules exist"
    value: ${{ steps.matrix.outputs.hasModules }}

runs:
  using: "composite"
  steps:

    - name: Changed files in libraries
      id: changed
      if: ${{ inputs.modules == '' }}
      uses: tj-actions/changed-files@v45
      with:
        files: |
          libraries/**

    - name: Compute modules (matrix json)
      id: matrix
      shell: bash
      run: |
        set -euo pipefail

        # -----------------------------
        # Manual override
        # -----------------------------
        if [[ -n '${{ inputs.modules }}' ]]; then
          modules='${{ inputs.modules }}'

          if [[ "$modules" == "[]" ]]; then
            hasModules=false
          else
            hasModules=true
          fi

          {
            echo "value=$modules"
            echo "hasModules=$hasModules"
          } >> "$GITHUB_OUTPUT"

          exit 0
        fi

        # -----------------------------
        # No changes detected
        # -----------------------------
        if [[ "${{ steps.changed.outputs.any_changed || 'false' }}" != "true" ]]; then
          {
            echo "value=[]"
            echo "hasModules=false"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        files_raw='${{ steps.changed.outputs.all_changed_files }}'

        files_list=$(printf "%s" "$files_raw" | tr ' \n' '\n' | sed '/^$/d')

        modules=$(printf "%s\n" "$files_list" \
          | sed -n 's|^libraries/\([^/]*\)/.*|:libraries:\1|p' \
          | sort -u)

        if [[ -z "$modules" ]]; then
          {
            echo "value=[]"
            echo "hasModules=false"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        json=$(printf "%s\n" "$modules" | jq -R . | jq -s .)

        echo "Matrix JSON: $json"

        {
          echo "value=$json"
          echo "hasModules=true"
        } >> "$GITHUB_OUTPUT"

    - name: Write modules to job summary
      shell: bash
      run: |
        set -euo pipefail

        matrix='${{ steps.matrix.outputs.value }}'

        {
          echo "## 🔍 Modules with Changes"
          echo ""

          count=$(echo "$matrix" | jq 'length')

          if [[ "$count" -eq 0 ]]; then
            echo "✅ **No modules changed**"
            echo ""
          else
            echo "🧩 **Modules affected:** $count"
            echo ""
            echo "### 📦 Affected modules"
            echo ""

            echo "$matrix" | jq -r '.[] | "- `\(.)`"'
            echo ""
          fi

          echo "---"
          echo "_Generated by compute_changed_modules_"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"