name: Compute changed modules
description: Detects changed modules and returns matrix JSON

outputs:
  value:
    description: "JSON array of module paths"
    value: ${{ steps.matrix.outputs.value }}

  hasModules:
    description: "Whether modules exist"
    value: ${{ steps.matrix.outputs.hasModules }}

runs:
  using: "composite"
  steps:
    - name: Changed files in libraries
      id: changed
      uses: tj-actions/changed-files@v45
      with:
        files: |
          libraries/**

    - name: Compute modules (matrix json)
      id: matrix
      shell: bash
      run: |
        set -euo pipefail

        if [[ "${{ steps.changed.outputs.any_changed }}" != "true" ]]; then
          {
            echo "value=[]"
            echo "hasModules=false"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        files_raw='${{ steps.changed.outputs.all_changed_files }}'

        files_list=$(printf "%s" "$files_raw" | tr ' ' '\n' | sed '/^$/d')

        mods_csv=$(printf "%s\n" "$files_list" \
          | sed -n 's|^libraries/\([^/]*\)/.*|:libraries:\1|p' \
          | sort -u \
          | paste -sd, -)

        if [[ -z "$mods_csv" ]]; then
          {
            echo "value=[]"
            echo "hasModules=false"
          } >> "$GITHUB_OUTPUT"
          exit 0
        fi

        json=$(printf '%s' "$mods_csv" \
          | tr ',' '\n' \
          | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
          | sed '/^$/d' \
          | awk '{printf "%s\"%s\"", (NR==1?"":","), $0}' \
          | sed 's/^/[/' \
          | sed 's/$/]/')

        echo "Matrix JSON: $json"

        {
          echo "value<<EOF"
          echo "$json"
          echo "EOF"
          echo "hasModules=true"
        } >> "$GITHUB_OUTPUT"

    - name: Write modules to job summary
      shell: bash
      run: |
        set -euo pipefail

        matrix='${{ steps.matrix.outputs.value }}'

        {
          echo "## 🔍 Modules with Changes"
          echo ""

          if [[ "$matrix" == "[]" ]]; then
            echo "✅ **No modules changed**"
            echo ""
          else
            count=$(printf "%s" "$matrix" | tr -cd ',' | wc -c | tr -d ' ')
            count=$((count + 1))
            echo "🧩 **Modules affected:** $count"
            echo ""
            echo "### 📦 Affected modules"
            echo ""
            printf "%s\n" "$matrix" \
              | tr -d '[]"' \
              | tr ',' '\n' \
              | sed '/^$/d' \
              | sed 's/^/- `/; s/$/`/'
            echo ""
          fi

          echo "---"
          echo "_Generated by compute_changed_modules_"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"