name: Compute changed modules
description: Detects changed modules and returns matrix JSON

inputs:
  modules:
    description: "Optional JSON array override or 'all' to include all modules"
    required: false
    default: ""

outputs:
  value:
    description: "JSON array of module paths"
    value: ${{ steps.resolve.outputs.value }}

  hasModules:
    description: "Whether modules exist"
    value: ${{ steps.resolve.outputs.hasModules }}

runs:
  using: "composite"
  steps:

    # --------------------------------
    # Detect changed files (only if needed)
    # --------------------------------
    - name: Detect changed files
      id: changed
      if: ${{ inputs.modules == '' }}
      uses: tj-actions/changed-files@v45
      with:
        files: |
          libraries/**

    # --------------------------------
    # Resolve modules
    # --------------------------------
    - name: Resolve modules
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        # -------------------------
        # Manual override
        # -------------------------
        if [[ -n '${{ inputs.modules }}' ]]; then
          input_modules='${{ inputs.modules }}'

          # Check if input is "all"
          if [[ "$input_modules" == "all" ]]; then
            echo "Getting all modules from settings.gradle.kts..."
            
            # Extract all library modules from settings.gradle.kts
            modules=$(grep -E '^include\(":libraries:' settings.gradle.kts \
              | sed 's/include("\(.*\)")/\1/' \
              | jq -R . \
              | jq -s -c .)
            
            echo "All modules detected: $modules"
          else
            modules="$input_modules"
            
            # Validate JSON
            echo "$modules" | jq empty
          fi

        else
          # -------------------------
          # No changed files
          # -------------------------
          if [[ "${{ steps.changed.outputs.any_changed }}" != "true" ]]; then
            modules="[]"

          else
            files_raw='${{ steps.changed.outputs.all_changed_files }}'

            files_list=$(printf "%s" "$files_raw" | tr ' \n' '\n' | sed '/^$/d')

            modules=$(printf "%s\n" "$files_list" \
              | sed -n 's|^libraries/\([^/]*\)/.*|:libraries:\1|p' \
              | sort -u \
              | jq -R . \
              | jq -s -c .)
          fi
        fi

        hasModules=$(echo "$modules" | jq 'length > 0')

        echo "Modules JSON: $modules"

        echo "value=$modules" >> "$GITHUB_OUTPUT"
        echo "hasModules=$hasModules" >> "$GITHUB_OUTPUT"

    # --------------------------------
    # Summary
    # --------------------------------
    - name: Write modules to job summary
      shell: bash
      run: |
        set -euo pipefail

        matrix='${{ steps.resolve.outputs.value }}'
        count=$(echo "$matrix" | jq 'length')
        input_modules='${{ inputs.modules }}'

        {
          if [[ "$input_modules" == "all" ]]; then
            echo "## 🔍 All Modules Selected"
            echo ""
            echo "🧩 **Total modules:** $count"
          else
            echo "## 🔍 Modules with Changes"
            echo ""
            if [[ "$count" -eq 0 ]]; then
              echo "✅ **No modules changed**"
            else
              echo "🧩 **Modules affected:** $count"
            fi
          fi
          
          echo ""

          if [[ "$count" -gt 0 ]]; then
            echo "### 📦 Modules"
            echo ""
            echo "$matrix" | jq -r '.[] | "- `\(.)`"'
            echo ""
          fi

          echo "---"
          echo "_Generated by compute_changed_modules_"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"