name: Compute changed modules
description: Detects changed Gradle modules from settings.gradle.kts and returns a JSON array for a GitHub Actions matrix.

inputs:
  modules:
    description: "Optional JSON array override or 'all' to include all modules"
    required: false
    default: ""

outputs:
  value:
    description: "JSON array of Gradle module paths that changed"
    value: ${{ steps.resolve.outputs.value }}

  hasModules:
    description: "true when at least one module was detected"
    value: ${{ steps.resolve.outputs.hasModules }}

runs:
  using: composite
  steps:
    - name: Extract modules from settings.gradle.kts
      id: extract_modules
      shell: bash
      run: |
        set -euo pipefail

        modules=$(grep -E '^[[:space:]]*include\(":' settings.gradle.kts \
          | sed -E 's|^[[:space:]]*include\("([^"]+)"\).*|\1|' \
          | jq -R . \
          | jq -s -c .)

        module_patterns=$(echo "$modules" \
          | jq -r '.[]' \
          | sed 's|^:||' \
          | sed 's|:|/|g' \
          | sed 's|$|/**|')

        echo "modules=$modules" >> "$GITHUB_OUTPUT"

        {
          echo 'patterns<<EOF'
          echo "$module_patterns"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Detect changed files
      id: changed
      if: ${{ inputs.modules == '' }}
      uses: tj-actions/changed-files@v45
      with:
        files: ${{ steps.extract_modules.outputs.patterns }}

    - name: Resolve modules
      id: resolve
      shell: bash
      run: |
        set -euo pipefail

        if [[ -n '${{ inputs.modules }}' ]]; then
          input_modules='${{ inputs.modules }}'

          if [[ "$input_modules" == "all" ]]; then
            modules='${{ steps.extract_modules.outputs.modules }}'
          else
            modules="$input_modules"
            echo "$modules" | jq empty
          fi
        else
          if [[ "${{ steps.changed.outputs.any_changed }}" != "true" ]]; then
            modules="[]"
          else
            files_raw='${{ steps.changed.outputs.all_changed_files }}'
            files_list=$(printf "%s" "$files_raw" | tr ' \n' '\n' | sed '/^$/d')
            all_modules='${{ steps.extract_modules.outputs.modules }}'

            modules=$(printf "%s\n" "$files_list" | while read -r file; do
              echo "$all_modules" | jq -r '.[]' | while read -r module; do
                path="${module#:}"
                path="${path//:/\/}"

                if [[ "$file" == "$path/"* ]]; then
                  echo "$module"
                fi
              done
            done | sort -u | jq -R . | jq -s -c .)
          fi
        fi

        hasModules=$(echo "$modules" | jq 'length > 0')

        echo "Modules JSON: $modules"
        echo "value=$modules" >> "$GITHUB_OUTPUT"
        echo "hasModules=$hasModules" >> "$GITHUB_OUTPUT"

    - name: Write modules to job summary
      shell: bash
      run: |
        set -euo pipefail

        matrix='${{ steps.resolve.outputs.value }}'
        count=$(echo "$matrix" | jq 'length')
        input_modules='${{ inputs.modules }}'

        {
          if [[ "$input_modules" == "all" ]]; then
            echo "## 🔍 All Modules Selected"
            echo ""
            echo "🧩 **Total modules:** $count"
          else
            echo "## 🔍 Modules with Changes"
            echo ""
            if [[ "$count" -eq 0 ]]; then
              echo "✅ **No modules changed**"
            else
              echo "🧩 **Modules affected:** $count"
            fi
          fi

          echo ""

          if [[ "$count" -gt 0 ]]; then
            echo "### 📦 Modules"
            echo ""
            echo "$matrix" | jq -r '.[] | "- `\(.)`"'
            echo ""
          fi

          echo "---"
          echo "_Generated by compute_changed_modules_"
        } >> "$GITHUB_STEP_SUMMARY"