# This is a basic workflow to help you get started with Actions

name: Continuous Integration (Publish)

# Workflow events: Controls when the action will run.
# More info: https://docs.github.com/en/actions/reference/events-that-trigger-workflows
on:
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:

      modules:
        description: 'JSON array of modules (e.g. [":libraries:core",":libraries:network"]). Leave empty for auto.'
        required: false
        default: ''

      bom-module:
        description: 'BOM module name (used for version bumping, e.g. ":bom")'
        required: false
        default: ':bom'

      build-type:
        description: 'Build type (Debug or Release)'
        required: false
        default: 'Release'

      publication-type:
        description: 'Central Portal publication type (USER_MANAGED or AUTOMATIC)'
        required: false
        default: 'USER_MANAGED'

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Increment this to invalidate the cache.
  CACHE_VERSION: 1
  # Increase Gradle heap size to prevent OOM errors in large builds
  GRADLE_OPTS: >
    -Dorg.gradle.jvmargs=-Xmx4g
    -Dkotlin.daemon.jvm.options=-Xmx2g
  # Enable debug for the `gradle-build-action` cache operations
  GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true
  # Retention days used for output files
  RETENTION_DAYS: 1
  # Build type
  BUILD_TYPE: ${{ github.event.inputs.build-type || 'Release' }}
  # Publishing type for Central Portal (USER_MANAGED or AUTOMATIC)
  PUBLICATION_TYPE: ${{ github.event.inputs.publication-type || 'AUTOMATIC' }}
  # BOM module name (used for version bumping)
  BOM_MODULE: ${{ github.event.inputs.bom-module || ':bom' }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  info:
    name: Workflow Information
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Print workflow information
        uses: ./.github/actions/info

  computeChangedModules:
    name: Compute changed modules
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      modules: ${{ steps.computed.outputs.value }}
      hasModules: ${{ steps.computed.outputs.hasModules }}

    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - name: Compute changed modules
        id: computed
        uses: ./.github/actions/compute_changed_modules
        with:
          modules: ${{ github.event.inputs.modules || '' }}

  checkstyle:
    name: Check code style
    needs: [ computeChangedModules ]
    if: ${{ needs.computeChangedModules.outputs.hasModules == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: ./.github/actions/setup

      - name: Check code via Detekt
        uses: ./.github/actions/checkstyle
        with:
          retention-days: ${{ env.RETENTION_DAYS }}

  build:
    name: Build
    needs: [ checkstyle ]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: ./.github/actions/setup

      - name: Assemble ${{ env.BUILD_TYPE }}
        uses: ./.github/actions/assemble
        with:
          build-type: ${{ env.BUILD_TYPE }}
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Cancel workflow run if failed
        if: failure()
        uses: ./.github/actions/workflow_run
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          operation: cancel

  test:
    name: Run Unit Tests
    needs: [ checkstyle ]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: ./.github/actions/setup

      - name: Execute unit tests
        uses: ./.github/actions/unit_tests
        with:
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Cancel workflow run if failed
        if: failure()
        uses: ./.github/actions/workflow_run
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          operation: cancel

  publish:
    name: Publish to Central (aggregation)
    needs: [ build, test, computeChangedModules ]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - uses: ./.github/actions/setup

      - name: Build nmcpProjects
        id: nmcp
        shell: bash
        run: |
          set -euo pipefail
          
          modules='${{ needs.computeChangedModules.outputs.modules }}'
          nmcpProjects="$(echo "$modules" | jq -r --arg bom "${{ env.BOM_MODULE }}" '. + [$bom] | join(",")')"
          
          echo "nmcpProjects=$nmcpProjects" >> "$GITHUB_OUTPUT"
          echo "nmcpProjects: $nmcpProjects"

      - name: Publish aggregation
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        shell: bash
        run: |
          ./gradlew publishAggregationToCentralPortal \
            -PnmcpProjects="${{ steps.nmcp.outputs.nmcpProjects }}" \
            -PpublishingType="${{ env.PUBLICATION_TYPE }}" \
            --no-configuration-cache

  bump:
    name: Bump version
    needs: [ publish, computeChangedModules ]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          persist-credentials: true

      - uses: ./.github/actions/setup

      - name: Get PR info
        id: pr_info
        uses: ./.github/actions/pr_info

      - name: Bump version
        uses: ./.github/actions/bump_version
        with:
          version: ${{ steps.pr_info.outputs.bump }}
          modules: ${{ needs.computeChangedModules.outputs.modules }}
          git-branch: ${{ github.ref_name }}
          git-user-name: ${{ vars.CI_GIT_USER_NAME }}
          git-user-email: ${{ vars.CI_GIT_USER_EMAIL }}

  bump-bom:
    name: Bump BOM version
    needs: [ bump ]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          persist-credentials: true

      - uses: ./.github/actions/setup

      - name: Get PR info
        id: pr_info
        uses: ./.github/actions/pr_info

      - name: Bump version
        uses: ./.github/actions/bump_version
        with:
          version: ${{ steps.pr_info.outputs.bump }}
          modules: '["${{ env.BOM_MODULE }}"]'
          git-create-tag: true
          git-branch: ${{ github.ref_name }}
          git-user-name: ${{ vars.CI_GIT_USER_NAME }}
          git-user-email: ${{ vars.CI_GIT_USER_EMAIL }}
