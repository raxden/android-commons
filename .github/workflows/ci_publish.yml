# This is a basic workflow to help you get started with Actions

name: Continuous Integration (Publish)

# Workflow events: Controls when the action will run.
# More info: https://docs.github.com/en/actions/reference/events-that-trigger-workflows
on:
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:

      modules:
        description: 'JSON array of modules (e.g. [":libraries:core",":libraries:network"]). Leave empty for auto.'
        required: false
        default: ''

      build_type:
        description: 'Build type (Debug or Release)'
        required: false
        default: 'Release'

      publication_type:
        description: 'Central Portal publication type (USER_MANAGED or AUTOMATIC)'
        required: false
        default: 'USER_MANAGED'

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Increment this to invalidate the cache.
  CACHE_VERSION: 1
  # Enable debug for the `gradle-build-action` cache operations
  GRADLE_BUILD_ACTION_CACHE_DEBUG_ENABLED: true
  # Retention days used for output files
  RETENTION_DAYS: 1
  # Build type
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  # Publishing type for Central Portal (USER_MANAGED or AUTOMATIC)
  PUBLICATION_TYPE: ${{ github.event.inputs.publication_type || 'AUTOMATIC' }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  info:
    name: Workflow Information
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Print workflow information
        uses: ./.github/actions/info

  computeChangedModules:
    name: Compute changed modules
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      modules: ${{ steps.modules.outputs.modules }}
      hasModules: ${{ steps.modules.outputs.hasModules }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Compute changed modules
        id: computed
        if: ${{ (github.event.inputs.modules || '') == '' }}
        uses: ./.github/actions/compute_changed_modules

      - name: Resolve modules output
        id: modules
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n '${{ github.event.inputs.modules || '' }}' ]]; then
            modules='${{ github.event.inputs.modules }}'
          else
            modules='${{ steps.computed.outputs.modules || steps.computed.outputs.value || '[]' }}'
          fi

          hasModules=$([[ "$modules" == "[]" ]] && echo false || echo true)

          {
            echo "modules<<EOF"
            echo "$modules"
            echo "EOF"
            echo "hasModules=$hasModules"
          } >> "$GITHUB_OUTPUT"

  checkstyle:
    name: Check code style
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup build environment
        uses: ./.github/actions/setup

      - name: Check code via Detekt
        uses: ./.github/actions/checkstyle
        with:
          retention-days: ${{ env.RETENTION_DAYS }}

  build:
    name: Build
    needs: [ checkstyle, computeChangedModules ]
    if: ${{ needs.computeChangedModules.outputs.hasModules == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup build environment
        uses: ./.github/actions/setup

      - name: Assemble ${{ env.BUILD_TYPE }}
        uses: ./.github/actions/assemble
        with:
          build-type: ${{ env.BUILD_TYPE }}
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Cancel workflow run if failed
        if: failure()
        uses: ./.github/actions/workflow_run
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          operation: cancel

  test:
    name: Run Unit Tests
    needs: [ checkstyle, computeChangedModules ]
    if: ${{ needs.computeChangedModules.outputs.hasModules == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup build environment
        uses: ./.github/actions/setup

      - name: Execute unit tests
        uses: ./.github/actions/unit_tests
        with:
          build-type: ${{ env.BUILD_TYPE }}
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Cancel workflow run if failed
        if: failure()
        uses: ./.github/actions/workflow_run
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          operation: cancel

  publish:
    name: Publish to Central (aggregation)
    needs: [ build, test, computeChangedModules ]
    if: ${{ needs.computeChangedModules.outputs.hasModules == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup build environment
        uses: ./.github/actions/setup

      - name: Publish aggregation
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        shell: bash
        run: |
          ./gradlew publishAggregationToCentralPortal \
            -PnmcpProjects="${{ join(fromJson(needs.computeChangedModules.outputs.modules), ',') }}" \
            -PpublishingType="${{ env.PUBLICATION_TYPE }}" \
            --no-configuration-cache

  bump:
    name: Bump version
    needs: [ publish, computeChangedModules ]
    if: ${{ needs.computeChangedModules.outputs.hasModules == 'true' }}
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        module: ${{ fromJson(needs.computeChangedModules.outputs.modules) }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          persist-credentials: true

      - name: Setup build environment
        uses: ./.github/actions/setup

      - name: Get PR info
        id: pr_info
        uses: ./.github/actions/pr_info

      - name: Bump version
        uses: ./.github/actions/bump_version
        with:
          version: ${{ steps.pr_info.outputs.bump }}
          module: ${{ matrix.module }}
          git-branch: ${{ github.ref_name }}
          git-user-name: ${{ vars.CI_GIT_USER_NAME }}
          git-user-email: ${{ vars.CI_GIT_USER_EMAIL }}